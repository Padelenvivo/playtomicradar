name: Freedom Telegram availability

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  check-availability:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: telegram-radar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm run check
      - run: npm start
        env:
          CLUB_NAME: Freedom Wellness XX Padel Club
          TIMEZONE: Europe/Madrid
          BOOKING_URL: https://playtomic.com/clubs/freedom-wellness-xx-padel-club
          PLAYTOMIC_TENANT_ID: 838146b1-c519-4000-82fa-017fc76304f5
          DRY_RUN: "true"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
